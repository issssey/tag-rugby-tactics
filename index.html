<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タグラグビー戦術アニメーション</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-container">

    <!-- 左: サイドバー -->
    <div class="sidebar">
<!-- 戦術（選択 + 情報） -->
      <div class="panel">
        <div class="panel-label">戦術</div>
        <div class="selector-row">
          <select id="select-tactics">
            <option value="">読み込み中...</option>
          </select>
        </div>
        <div id="load-error" class="load-error" style="display:none;"></div>
        <div class="divider"></div>
        <div class="tactics-info">
          <div id="tactics-name" class="tactics-name">戦術を選択してください</div>
          <div id="tactics-description" class="tactics-description"></div>
          <div class="tactics-meta">
<span>作成者: <span id="tactics-author"></span></span>
          </div>
        </div>
      </div>

      <!-- 再生 -->
      <div class="panel panel-playback">
        <div class="panel-label">再生</div>
        <div class="controls-row">
          <button id="btn-prev-phase" title="前のフェーズ">◀◀</button>
          <button id="btn-prev-step" title="前のステップ">◀</button>
          <button id="btn-play">▶ 再生</button>
          <button id="btn-next-step" title="次のステップ">▶</button>
          <button id="btn-next-phase" title="次のフェーズ">▶▶</button>
        </div>
        <div class="controls-row">
          <button id="btn-reset">リセット</button>
          <label class="speed-label" for="select-speed">速度</label>
          <select id="select-speed">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="2">2x</option>
          </select>
        </div>
      </div>

      <!-- 状態 -->
      <div class="panel">
        <div class="panel-label">状態</div>
        <div class="status-bar">
          <span id="status-phase">フェーズ: — / —</span>
          <span id="status-step">ステップ: — / —</span>
          <span id="status-tag">タグ: 0 / 0</span>
          <span id="status-step-type" class="step-type-badge type-none"></span>
        </div>
        <div id="status-description" class="status-description"></div>
      </div>

      <!-- 表示設定 -->
      <div class="panel">
        <div class="panel-label">表示設定</div>
        <div class="legend-row">
          <div class="legend-item">
            <div class="legend-dot" style="background:#378ADD; border-color:#378ADD;"></div>
            <span>攻撃側</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:#D85A30; border-color:#D85A30;"></div>
            <span>ディフェンス</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:transparent; border-color:#FFD700;"></div>
            <span>ハイライト</span>
          </div>
        </div>
        <div class="divider"></div>
        <label class="toggle-label">
          <input type="checkbox" id="cb-trail" />
          <span>軌跡表示</span>
        </label>
      </div>

    </div><!-- /sidebar -->

    <!-- 右: 作戦ボード -->
    <div class="board-area">
<svg id="field" viewBox="0 0 660 660"></svg>
    </div>

  </div><!-- /app-container -->

  <!-- モバイル固定再生バー -->
  <div class="mobile-playbar">
    <button id="btn-prev-phase-m" title="前のフェーズ">◀◀</button>
    <button id="btn-prev-step-m" title="前のステップ">◀</button>
    <button id="btn-play-m">▶ 再生</button>
    <button id="btn-next-step-m" title="次のステップ">▶</button>
    <button id="btn-next-phase-m" title="次のフェーズ">▶▶</button>
  </div>

  <script src="js/grid.js"></script>
  <script src="js/player.js"></script>
  <script src="js/ball.js"></script>
  <script src="js/animator.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/tacticsLoader.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
